kind = "web"
previewPath = "/"
title = "EduSphere"
version = "1.0.0"
id = "artifacts/edusphere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24784

[services.development]
run = "pnpm --filter @workspace/edusphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edusphere", "run", "build" ]
publicDir = "artifacts/edusphere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24784"
BASE_PATH = "/"
